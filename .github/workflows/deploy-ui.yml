# Build the Vite UI and push to Cloudflare Pages on every push to main.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with "Cloudflare Pages — Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — found on the Cloudflare dashboard sidebar
#   VITE_CDS_URL          — e.g. https://algebraic-cds.up.railway.app
#                           (the URL the UI's fetch() calls hit at runtime)
#
# Pages project name below ("algebraic-cds") must match the project you
# create in the Cloudflare dashboard. Change in both places to rename.

name: Deploy UI to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        env:
          VITE_CDS_URL: ${{ secrets.VITE_CDS_URL }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: algebraic-cds
          directory: ui/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
